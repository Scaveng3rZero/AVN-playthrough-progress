<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scaveng3r Live Stream Schedule</title>
<link rel="stylesheet" href="css/style.css">

<style>

.schedule-container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.schedule-title{
text-align:center;
font-size:2.5rem;
margin-bottom:10px;
}

.schedule-subtitle{
text-align:center;
opacity:.8;
margin-bottom:40px;
}

.schedule-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.day-card{
background:#111;
border:1px solid #333;
border-radius:10px;
padding:20px;
text-align:center;
}

.day-card h3{
margin-top:0;
font-size:1.4rem;
}

.stream-game{
font-size:1.1rem;
margin-top:10px;
}

.stream-time{
opacity:.8;
font-size:.9rem;
margin-top:5px;
}

.off-day{
opacity:.5;
}

.discord-button{
display:block;
margin:40px auto;
text-align:center;
background:#5865F2;
padding:15px 30px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:bold;
width:220px;
}

</style>

</head>

<body>

<div class="schedule-container">

<h1 class="schedule-title">Live Stream Schedule</h1>

<p class="schedule-subtitle">
Join the Scaveng3r community live on Discord.
All times Eastern.
</p>

<div class="schedule-grid">

<div class="day-card off-day">
<h3>Monday</h3>
<p>No Stream</p>
</div>

<div class="day-card off-day">
<h3>Tuesday</h3>
<p>No Stream</p>
</div>

<div class="day-card off-day">
<h3>Wednesday</h3>
<p>No Stream</p>
</div>

<div class="day-card">
<h3>Thursday</h3>
<p class="stream-game">After the Inferno</p>
<p class="stream-time">7:00 PM EST</p>
</div>  

<div class="day-card">
<h3>Friday</h3>
<p class="stream-game">After the Inferno</p>
<p class="stream-time">7:00 PM EST</p>
</div>

<div class="day-card off-day">
<h3>Saturday</h3>
<p>No Stream</p>
</div>

<div class="day-card off-day">
<h3>Sunday</h3>
<p>No Stream</p>
</div>

</div>

<a class="discord-button" href="https://discord.gg/XzeJR492qN">
Join the Discord
</a>

</div>

</body>
</html>
